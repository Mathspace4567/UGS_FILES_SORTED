<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Maths | Ultimate Game Stash</title>
    <style>
        :root {
            --bg-color: #121214;
            --container-bg: #1a1a1e;
            --accent-color: #ffcc00; /* Duck Yellow */
            --text-color: #ffffff;
            --text-secondary: #a0a0a5;
            --card-bg: #26262b;
            --card-hover: #323238;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background-color: var(--container-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent-color);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            text-decoration: none;
        }

        .search-box {
            padding: 10px 15px;
            border-radius: 20px;
            border: 2px solid #3e3e42;
            background-color: var(--card-bg);
            color: white;
            outline: none;
            width: 250px;
        }

        .search-box:focus {
            border-color: var(--accent-color);
        }

        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Card Button Elements */
        .game-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
            border: 1px solid #333;
            text-align: center;
            padding: 15px 10px;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            background-color: var(--card-hover);
        }

        .game-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .game-title {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }

        /* Screen Overlay Container for Frame */
        .game-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            z-index: 1000;
        }

        .game-header {
            background: var(--container-bg);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        iframe {
            flex-grow: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="closeGame()">🦆 Duck Maths</a>
        <input type="text" id="search" class="search-box" placeholder="Search games..." onkeyup="filterGames()">
    </header>

    <main id="mainContent">
        <h2>All Games</h2>
        <div class="game-grid">
            
            <!-- W FOLDER GAMES -->
            <div class="game-card" onclick="loadGame('W/clworldshardestgame.html', 'Worlds Hardest Game')">
                <div class="game-icon">🟥</div>
                <p class="game-title">World's Hardest Game</p>
            </div>

            <div class="game-card" onclick="loadGame('W/clwrestlebros.html', 'Wrestle Bros')">
                <div class="game-icon">🤼</div>
                <p class="game-title">Wrestle Bros</p>
            </div>

            <div class="game-card" onclick="loadGame('W/clwebecomewhatwebehold.html', 'We Become What We Behold')">
                <div class="game-icon">📺</div>
                <p class="game-title">We Become What We Behold</p>
            </div>

            <div class="game-card" onclick="loadGame('W/clwordle.html', 'Wordle')">
                <div class="game-icon">🟩</div>
                <p class="game-title">Wordle</p>
            </div>

            <!-- EXAMPLE FROM ANOTHER FOLDER -->
            <div class="game-card" onclick="loadGame('1/cl1v1lol.html', '1v1.LOL')">
                <div class="game-icon">🧱</div>
                <p class="game-title">1v1.LOL</p>
            </div>

        </div>
    </main>

    <!-- Fullscreen Player Screen -->
    <div class="game-container" id="gameScreen">
        <div class="game-header">
            <h3 id="currentGameTitle" style="margin:0;">Game Loading...</h3>
            <button class="close-btn" onclick="closeGame()">Back to Main Menu</button>
        </div>
        <iframe id="gameFrame" src=""></iframe>
    </div>

    <script>
        // Open the game iframe internally
        function loadGame(gamePath, gameName) {
            document.getElementById('currentGameTitle').innerText = gameName;
            document.getElementById('gameFrame').src = gamePath;
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'none';
        }

        // Close game and return to main screen
        function closeGame() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('gameFrame').src = '';
            document.getElementById('mainContent').style.display = 'block';
        }

        // Search engine filter logic
        function filterGames() {
            const input = document.getElementById('search').value.toLowerCase();
            const cards = document.getElementsByClassName('game-card');
            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].querySelector('.game-title').innerText.toLowerCase();
                cards[i].style.display = title.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
